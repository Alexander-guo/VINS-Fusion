services:
  vins-fusion:
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        USER_UID: ${USER_UID:-1000}
        USER_GID: ${USER_GID:-1000}
        USERNAME: ${USER:-root}
    image: vins-fusion
    container_name: vins-fusion
    privileged: true

    # On macOS/Windows, 'host' network mode isn't supported.
    # Use conditional network setup.
    network_mode: ${NETWORK_MODE:-bridge}
    pid: ${PID_MODE:-host}
    ipc: ${IPC_MODE:-host}

    # Automatically detect correct platform, standard Intel/AMD 64-bit
    # Override manually with: docker-compose build --build-arg PLATFORM=linux/amd64
    platform: ${PLATFORM:-${DOCKER_DEFAULT_PLATFORM:-linux/amd64}} 

    environment:
      - DEBIAN_FRONTEND=noninteractive
      - TZ=Etc/UTC
      - LANG=C.UTF-8
      - LC_ALL=C.UTF-8

      # Safe defaults: no DISPLAY if missing
      - DISPLAY=${DISPLAY:-}
      - QT_X11_NO_MITSHM=1

      # XAUTHORITY only if it exists locally (Docker will ignore if missing)
      - XAUTHORITY=/home/${USER}/.Xauthority

    volumes:
      # X11 forwarding for GUI tools like rviz, rqt, etc. (only matter if host uses X11)
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ${HOME}/.Xauthority:/home/${USER}/.Xauthority:rw

      # dataset mount, put your data into ./dataset
      - ${HOME}/media/data:/media/data:rw

    command: [ "bash" ]
    tty: true
    stdin_open: true
