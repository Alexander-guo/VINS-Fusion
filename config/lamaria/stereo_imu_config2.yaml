%YAML:1.0

#common parameters
#support: 1 imu 1 cam; 1 imu 2 cam: 2 cam; 
imu: 1         
num_of_cam: 2  

imu_topic: "/imu0"
image0_topic: "/cam0/image_raw"
image1_topic: "/cam1/image_raw"
output_path: "/home/ws/output"

cam0_calib: "cam_l_config2.yaml"
cam1_calib: "cam_r_config2.yaml"

## cam_l & cam_r given as rectified (after crop), so slightly smaller than the original image size
## these two parameters are used in loop fusion module, here we set them according to cam_l
image_width: 780
image_height: 584
   

# Extrinsic parameter between IMU and Camera.
estimate_extrinsic: 0   # 0  Have an accurate extrinsic parameters. We will trust the following imu^R_cam, imu^T_cam, don't change it.
                        # 1  Have an initial guess about extrinsic parameters. We will optimize around your initial guess.

body_T_cam0: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [  0.98203681,  0.18767333, -0.01955547,  0.01173385,                                                                                                                                              
            0.02705029, -0.24259343, -0.96975085, -0.10854187,                                                                                                                                              
            -0.18674040,  0.95180205, -0.24331230,  0.07667147,                                                                                                                                             
            0.0, 0.0, 0.0, 1.0] 

body_T_cam1: !!opencv-matrix
   rows: 4
   cols: 4
   dt: d
   data: [  0.98948618, -0.00793047, -0.14440988, -0.00224607,                                                                                                                                              
            -0.00927917, -0.99991938, -0.00866824,  0.00018810,                                                                                                                                             
            -0.14432949,  0.00991711, -0.98947999, -0.00645281,                                                                                                                                             
            0.0, 0.0, 0.0, 1.0]                                 

#Multiple thread support
multiple_thread: 1

#feature traker paprameters
max_cnt: 150            # max feature number in feature tracking
min_dist: 30            # min distance between two features 
freq: 10                # frequence (Hz) of publish tracking result. At least 10Hz for good estimation. If set 0, the frequence will be same as raw image 
F_threshold: 1.0        # ransac threshold (pixel)
show_track: 1           # publish tracking image as topic
flow_back: 1            # perform forward and backward optical flow to improve feature tracking accuracy

#optimization parameters
max_solver_time: 0.04  # max solver itration time (ms), to guarantee real time
max_num_iterations: 8   # max solver itrations, to guarantee real time
keyframe_parallax: 10.0 # keyframe selection threshold (pixel)

#imu parameters       The more accurate parameters you provide, the better performance
acc_n: 0.0007844799999999999          # accelerometer measurement noise standard deviation. 
gyr_n: 0.00017453292519943296        # gyroscope measurement noise standard deviation.     
acc_w: 0.0064483304620110765        # accelerometer bias random work noise standard deviation.  
gyr_w: 0.00024437102728225855      # gyroscope bias random work noise standard deviation.     
g_norm: 9.806     # gravity magnitude

#unsynchronization parameters
estimate_td: 0                      # online estimate time offset between camera and imu
td: 0           # initial value of time offset. unit: s. readed image clock + td = real image clock (IMU clock)

#loop closure parameters
load_previous_pose_graph: 0        # load and reuse previous pose graph; load from 'pose_graph_save_path'
pose_graph_save_path: "/home/ws/output/pose_graph" # save and load path
save_image: 1                   # save image in pose graph for visualization prupose; you can close this function by setting 0 
